<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamar Pekerjaan — InfoLoker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b13;
  --panel: #111826;
  --panel-h: #162035;
  --line: #1e2d45;
  --text: #d8e8ff;
  --muted: #6a88aa;
  --brand: #38B6FF;
  --brand-d: #1892e6;
  --brand-faint: rgba(56,182,255,.09);
  --danger: #ff6f6f;
  --shadow: 0 18px 48px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Mulish',sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 12% -4%,rgba(56,182,255,.12),transparent 28%),
    radial-gradient(circle at 85% 10%,rgba(56,182,255,.06),transparent 30%),
    linear-gradient(180deg,#050911 0%,#070b13 55%,#060a12 100%);
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.nav{
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--line);
  background:rgba(5,9,17,.9);backdrop-filter:blur(14px);
}
.nav-inner{
  max-width:1200px;margin:0 auto;padding:0 28px;
  height:62px;display:flex;align-items:center;gap:32px;
}
.logo-mark{
  display:flex;align-items:center;gap:10px;
  font-family:'Sora',sans-serif;font-weight:800;font-size:1.05rem;flex-shrink:0;
}
.logo-dot{
  width:12px;height:12px;border-radius:50%;background:var(--brand);
  box-shadow:0 0 14px rgba(56,182,255,.8);
  animation:pulse 2.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 14px rgba(56,182,255,.8)}50%{box-shadow:0 0 28px rgba(56,182,255,1)}}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-links a{
  padding:7px 14px;border-radius:8px;
  font-size:.88rem;color:var(--muted);transition:color .2s,background .2s;
}
.nav-links a:hover{color:var(--text);background:var(--brand-faint)}
.btn-nav{
  margin-left:10px;padding:9px 20px;border-radius:10px;
  font-size:.88rem;font-weight:700;font-family:'Sora',sans-serif;
  background:linear-gradient(135deg,var(--brand),var(--brand-d));
  color:#040914;transition:opacity .2s;
}
.btn-nav:hover{opacity:.88}

.page-bar{
  max-width:1200px;margin:22px auto 0;padding:0 28px;
}
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:.8rem;color:var(--muted);
}
.breadcrumb a:hover{color:var(--brand)}
.breadcrumb span{color:var(--line)}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;margin-top:13px;
  font-size:.83rem;color:var(--muted);
  border:1px solid var(--line);border-radius:8px;
  padding:7px 13px;transition:all .2s;background:rgba(17,24,38,.6);
}
.back-btn:hover{border-color:rgba(56,182,255,.35);color:var(--text)}

.apply-shell{
  max-width:1200px;margin:20px auto 64px;padding:0 28px;
  display:grid;grid-template-columns:320px 1fr;
  gap:20px;align-items:start;
}

/* ── JOB SUMMARY SIDEBAR ─────────────────────────────────── */
.job-summary{
  position:sticky;top:78px;
  border:1px solid var(--line);border-radius:18px;
  padding:22px;background:rgba(17,24,38,.92);
  backdrop-filter:blur(10px);box-shadow:var(--shadow);
  animation:fadeUp .38s ease both;
}
.js-label{
  font-size:.7rem;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted);margin-bottom:16px;
}
.js-header{display:flex;align-items:flex-start;gap:13px;margin-bottom:16px}
.js-logo{
  width:52px;height:52px;border-radius:12px;
  object-fit:cover;border:1px solid var(--line);background:var(--panel);flex-shrink:0;
}
.js-logo-fb{
  width:52px;height:52px;border-radius:12px;
  border:1px solid var(--line);background:var(--panel);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:700;
  font-size:1.1rem;color:var(--brand);flex-shrink:0;
}
.js-company{font-size:.76rem;color:var(--muted);margin-bottom:4px}
.js-title{
  font-family:'Sora',sans-serif;
  font-size:.98rem;font-weight:700;line-height:1.25;
}
.js-badges{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.js-badge{
  display:flex;align-items:center;gap:8px;
  font-size:.78rem;color:var(--muted);
}
.js-badge span{color:var(--text)}
.js-salary-box{
  border:1px solid rgba(56,182,255,.22);border-radius:10px;
  padding:12px;background:var(--brand-faint);text-align:center;
  margin-bottom:16px;
}
.js-salary-box p{font-size:.7rem;color:var(--muted);margin-bottom:4px}
.js-salary-box strong{
  font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;color:var(--brand);
}
.steps-label{
  font-size:.7rem;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.step-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--line);
}
.step-item:last-child{border-bottom:none}
.step-dot{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--muted);flex-shrink:0;margin-top:1px;
}
.step-dot.active{
  border-color:var(--brand);
  background:rgba(56,182,255,.15);color:var(--brand);
}
.step-info strong{display:block;font-size:.8rem;margin-bottom:1px}
.step-info span{font-size:.72rem;color:var(--muted)}

/* ── FORM AREA ────────────────────────────────────────────── */
.form-area{animation:fadeUp .38s .06s ease both}

.form-section{
  border:1px solid var(--line);border-radius:18px;
  padding:24px;background:rgba(17,24,38,.88);
  margin-bottom:16px;box-shadow:var(--shadow);
}
.form-section-head{
  display:flex;align-items:center;gap:12px;margin-bottom:22px;
}
.section-num{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--brand);
  background:rgba(56,182,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:.8rem;font-weight:700;color:var(--brand);
  flex-shrink:0;
}
.form-section-head h2{
  font-family:'Sora',sans-serif;font-size:.98rem;font-weight:700;
}
.form-section-head p{font-size:.78rem;color:var(--muted);margin-top:2px}

.form-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
}
.form-grid.full{grid-template-columns:1fr}

.field{display:flex;flex-direction:column;gap:6px}
.field label{
  font-size:.78rem;font-weight:700;color:#b0c8e8;
  display:flex;align-items:center;gap:4px;
}
.field label .req{color:var(--danger);font-size:.85rem}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:10px;
  padding:10px 13px;
  background:#07101e;color:var(--text);
  font-family:'Mulish',sans-serif;font-size:.86rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 2px rgba(56,182,255,.16);
}
.field input.invalid{border-color:var(--danger)}
.field input::placeholder,.field textarea::placeholder{color:var(--muted)}
.field select option{background:#07101e}
.field textarea{resize:vertical;min-height:120px;line-height:1.65}
.field .hint{font-size:.72rem;color:var(--muted)}

/* file upload */
.file-drop{
  border:1.5px dashed var(--line);border-radius:12px;
  padding:24px;text-align:center;
  cursor:pointer;transition:border-color .2s,background .2s;
  position:relative;
}
.file-drop:hover,.file-drop.drag-over{
  border-color:var(--brand);background:var(--brand-faint);
}
.file-drop input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.file-drop-icon{font-size:1.8rem;line-height:1;display:block;margin-bottom:8px}
.file-drop p{font-size:.84rem;color:var(--muted);margin-bottom:4px}
.file-drop span{font-size:.72rem;color:var(--muted);opacity:.7}
.file-chosen{
  display:none;margin-top:10px;padding:8px 12px;
  border:1px solid rgba(56,182,255,.3);border-radius:8px;
  background:var(--brand-faint);font-size:.78rem;color:var(--brand);
  text-align:left;
}
.file-chosen.show{display:block}

/* skills tag input */
.skills-wrap{
  display:flex;flex-wrap:wrap;gap:6px;
  border:1px solid var(--line);border-radius:10px;
  padding:8px 10px;background:#07101e;
  min-height:44px;cursor:text;align-items:center;
  transition:border-color .2s,box-shadow .2s;
}
.skills-wrap:focus-within{
  border-color:var(--brand);
  box-shadow:0 0 0 2px rgba(56,182,255,.16);
}
.skill-tag{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--brand),var(--brand-d));
  color:#040914;border-radius:6px;
  padding:3px 9px;font-size:.76rem;font-weight:700;
  font-family:'Sora',sans-serif;
}
.skill-tag button{
  border:none;background:none;cursor:pointer;
  color:#040914;font-size:.9rem;line-height:1;padding:0;opacity:.7;
}
.skill-tag button:hover{opacity:1}
.skills-input{
  border:none;outline:none;background:transparent;
  color:var(--text);font-family:'Mulish',sans-serif;font-size:.84rem;
  min-width:100px;flex:1;padding:2px 4px;
}
.skills-hint{font-size:.72rem;color:var(--muted);margin-top:4px}

/* checkboxes */
.check-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border:1px solid var(--line);border-radius:12px;
  cursor:pointer;transition:border-color .2s,background .2s;
}
.check-row:hover{border-color:rgba(56,182,255,.3);background:rgba(56,182,255,.03)}
.check-row input[type="checkbox"]{
  width:16px;height:16px;margin-top:2px;flex-shrink:0;
  accent-color:var(--brand);cursor:pointer;
}
.check-label{font-size:.84rem;font-weight:600;margin-bottom:3px}
.check-sub{font-size:.74rem;color:var(--muted)}

/* submit */
.submit-row{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  margin-top:20px;
}
.btn-submit{
  padding:14px 36px;border:none;border-radius:12px;
  font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,var(--brand),var(--brand-d));
  color:#040914;cursor:pointer;
  transition:opacity .2s,transform .15s;
}
.btn-submit:hover:not(:disabled){opacity:.88;transform:translateY(-2px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-cancel{
  padding:14px 22px;border:1px solid var(--line);border-radius:12px;
  font-family:'Mulish',sans-serif;font-size:.88rem;color:var(--muted);
  transition:all .2s;
}
.btn-cancel:hover{border-color:rgba(56,182,255,.3);color:var(--text)}
.form-note{font-size:.74rem;color:var(--muted);flex:1;min-width:180px}

/* success screen */
.success-screen{
  text-align:center;padding:56px 28px;
  animation:fadeUp .5s ease both;
}
.success-icon{
  font-size:3.5rem;margin-bottom:18px;
  animation:successPop .6s .1s both;
}
@keyframes successPop{
  0%{transform:scale(.5);opacity:0}
  70%{transform:scale(1.15)}
  100%{transform:scale(1);opacity:1}
}
.success-screen h2{
  font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:12px;
}
.success-screen p{color:var(--muted);font-size:.92rem;margin-bottom:6px;line-height:1.6}
.success-screen .company-name{color:var(--brand);font-weight:700}
.success-actions{
  display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;
}
.btn-success-main{
  padding:13px 28px;border-radius:12px;
  font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;
  background:linear-gradient(135deg,var(--brand),var(--brand-d));
  color:#040914;transition:opacity .2s;
}
.btn-success-main:hover{opacity:.88}
.btn-success-sec{
  padding:13px 22px;border-radius:12px;
  border:1px solid var(--line);font-family:'Mulish',sans-serif;
  font-size:.88rem;color:var(--muted);transition:all .2s;
}
.btn-success-sec:hover{border-color:rgba(56,182,255,.3);color:var(--text)}

.not-found{
  max-width:480px;margin:80px auto;text-align:center;padding:0 28px;
}
.not-found h2{
  font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;
  margin-bottom:10px;
}
.not-found p{color:var(--muted);font-size:.9rem;margin-bottom:22px}

footer{
  border-top:1px solid var(--line);
  padding:28px;max-width:1200px;margin:0 auto;
}
.footer-inner{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;
}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{font-size:.82rem;color:var(--muted);transition:color .2s}
.footer-links a:hover{color:var(--brand)}
.footer-copy{font-size:.76rem;color:var(--muted);opacity:.55}

@media(max-width:860px){
  .apply-shell{grid-template-columns:1fr}
  .job-summary{position:static}
  .form-grid{grid-template-columns:1fr}
  .nav-links a:not(.btn-nav){display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo-mark">
      <span class="logo-dot"></span>
      InfoLoker
    </a>
    <div class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="listings.html">Lowongan</a>
      <a href="listings.html" class="btn-nav">Semua Lowongan</a>
    </div>
  </div>
</nav>

<div class="page-bar">
  <div class="breadcrumb">
    <a href="index.html">Beranda</a>
    <span>›</span>
    <a href="listings.html">Lowongan</a>
    <span>›</span>
    <span id="bc-title">Lamar</span>
  </div>
  <span id="back-link"><a href="listings.html" class="back-btn">← Kembali ke Daftar</a></span>
</div>

<div id="main-content">
  <div class="not-found">
    <p style="color:var(--muted)">Memuat formulir lamaran...</p>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="index.html" class="logo-mark">
      <span class="logo-dot" style="width:10px;height:10px"></span>
      InfoLoker
    </a>
    <div class="footer-links">
      <a href="listings.html">Lowongan</a>
      <a href="#">Perusahaan</a>
      <a href="#">Tentang Kami</a>
      <a href="#">Kontak</a>
    </div>
    <span class="footer-copy">© 2026 InfoLoker. Hak cipta dilindungi.</span>
  </div>
</footer>

<script src="./shared.js"></script>
<script>
let skills = [];

function addSkill(val) {
  const v = val.trim().replace(/,+$/, '').trim();
  if (!v || skills.includes(v)) return;
  skills.push(v);
  renderSkills();
}

function removeSkill(idx) {
  skills.splice(idx, 1);
  renderSkills();
}

function renderSkills() {
  const wrap = document.getElementById('skills-wrap');
  const inp = document.getElementById('skills-inp');
  wrap.innerHTML = skills.map((s, i) => `
    <span class="skill-tag">
      ${esc(s)}
      <button type="button" onclick="removeSkill(${i})">×</button>
    </span>
  `).join('') + `<input type="text" id="skills-inp" class="skills-input" placeholder="${skills.length ? '' : 'Ketik lalu Enter...'}" autocomplete="off">`;
  attachSkillInput();
  wrap.querySelector('#skills-inp').focus();
}

function attachSkillInput() {
  const inp = document.getElementById('skills-inp');
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addSkill(inp.value);
      inp.value = '';
    }
    if (e.key === 'Backspace' && !inp.value && skills.length) {
      removeSkill(skills.length - 1);
    }
  });
}

function handleFileDrop(zone, input, chosen) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) showFile(file, chosen);
  });
  input.addEventListener('change', () => {
    if (input.files[0]) showFile(input.files[0], chosen);
  });
}

function showFile(file, chosen) {
  const mb = (file.size / 1048576).toFixed(1);
  chosen.textContent = `✓ ${file.name} (${mb} MB)`;
  chosen.classList.add('show');
}

function validateAndSubmit(e) {
  e.preventDefault();
  let ok = true;

  ['full-name', 'email', 'phone'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) {
      if (el) el.classList.add('invalid');
      ok = false;
    } else {
      el.classList.remove('invalid');
    }
  });

  const email = document.getElementById('email');
  if (email && email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
    email.classList.add('invalid');
    ok = false;
  }

  const agree = document.getElementById('agree-privacy');
  if (!agree || !agree.checked) {
    ok = false;
    agree && agree.closest('.check-row').style.setProperty('border-color', 'var(--danger)');
  }

  if (!ok) {
    const first = document.querySelector('.invalid, [style*="danger"]');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';

  const jobId = new URLSearchParams(location.search).get('id');
  setTimeout(() => showSuccess(parseInt(jobId)), 1200);
}

async function showSuccess(jobId) {
  let company = 'Perusahaan';
  let title = 'Posisi ini';
  try {
    const jobs = await fetchJobs();
    const job = jobs.find(j => j.id === jobId);
    if (job) { company = job.company; title = job.title; }
  } catch(_) {}

  document.getElementById('main-content').innerHTML = `
    <div style="max-width:600px;margin:0 auto;padding:0 28px">
      <div class="form-section success-screen">
        <div class="success-icon">🎉</div>
        <h2>Lamaran Terkirim!</h2>
        <p>Selamat! Lamaranmu untuk posisi <strong>${esc(title)}</strong> di
        <span class="company-name">${esc(company)}</span> telah berhasil dikirim.</p>
        <p>Tim rekruter akan meninjau lamaranmu dan menghubungi melalui email atau telepon dalam 3–7 hari kerja.</p>
        <p style="margin-top:12px;font-size:.8rem;color:var(--muted)">
          Sambil menunggu, pastikan kamu memantau email dan tetap aktif mencari peluang lain!
        </p>
        <div class="success-actions">
          <a href="listings.html" class="btn-success-main">Lihat Lowongan Lain</a>
          <a href="index.html" class="btn-success-sec">Kembali ke Beranda</a>
        </div>
      </div>
    </div>
  `;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id'));

  if (!id) { showError('ID lowongan tidak ditemukan.'); return; }

  let jobs;
  try {
    jobs = await fetchJobs();
  } catch(_) {
    showError('Gagal memuat data. Pastikan server lokal aktif.');
    return;
  }

  const job = jobs.find(j => j.id === id);
  if (!job) { showError('Lowongan tidak ditemukan.'); return; }

  document.title = `Lamar: ${job.title} di ${job.company} — InfoLoker`;
  document.getElementById('bc-title').textContent = `Lamar ${job.title}`;
  document.getElementById('back-link').innerHTML =
    `<a href="job-detail.html?id=${job.id}" class="back-btn">← Detail Pekerjaan</a>`;

  document.getElementById('main-content').innerHTML = `
    <div class="apply-shell">
      <aside class="job-summary">
        <p class="js-label">Kamu melamar untuk</p>
        <div class="js-header">
          <img src="${logoPath(job.company)}" alt="${esc(job.company)}" class="js-logo"
            data-fb="${esc(job.company[0])}"
            onerror="var d=document.createElement('div');d.className='js-logo-fb';d.textContent=this.dataset.fb;this.replaceWith(d)">
          <div>
            <p class="js-company">${esc(job.company)}</p>
            <h3 class="js-title">${esc(job.title)}</h3>
          </div>
        </div>
        <div class="js-badges">
          <div class="js-badge">📍&nbsp;<span>${esc(job.location)}</span></div>
          <div class="js-badge">💼&nbsp;<span>${esc(job.type)}</span></div>
          <div class="js-badge">🏷&nbsp;<span>${esc(job.category)}</span></div>
          <div class="js-badge">📅&nbsp;<span>${fmtDateLong(job.posted_date)}</span></div>
        </div>
        <div class="js-salary-box">
          <p>Kisaran Gaji</p>
          <strong>${esc(job.salary)}</strong>
        </div>
        <p class="steps-label">Tahapan Lamaran</p>
        <div>
          <div class="step-item">
            <div class="step-dot active">1</div>
            <div class="step-info">
              <strong>Formulir Lamaran</strong>
              <span>Sedang dikerjakan</span>
            </div>
          </div>
          <div class="step-item">
            <div class="step-dot">2</div>
            <div class="step-info">
              <strong>Review HR</strong>
              <span>3–7 hari kerja</span>
            </div>
          </div>
          <div class="step-item">
            <div class="step-dot">3</div>
            <div class="step-info">
              <strong>Wawancara</strong>
              <span>Akan dijadwalkan</span>
            </div>
          </div>
          <div class="step-item">
            <div class="step-dot">4</div>
            <div class="step-info">
              <strong>Keputusan Final</strong>
              <span>Notifikasi via email</span>
            </div>
          </div>
        </div>
      </aside>

      <section class="form-area">
        <form id="apply-form" novalidate>

          <div class="form-section">
            <div class="form-section-head">
              <div class="section-num">1</div>
              <div>
                <h2>Data Pribadi</h2>
                <p>Informasi dasar tentang kamu</p>
              </div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label>Nama Lengkap <span class="req">*</span></label>
                <input type="text" id="full-name" placeholder="Nama sesuai KTP">
              </div>
              <div class="field">
                <label>Email <span class="req">*</span></label>
                <input type="email" id="email" placeholder="nama@email.com">
              </div>
              <div class="field">
                <label>Nomor Telepon / WA <span class="req">*</span></label>
                <input type="tel" id="phone" placeholder="08xx-xxxx-xxxx">
              </div>
              <div class="field">
                <label>Kota Domisili</label>
                <input type="text" id="city" placeholder="Contoh: Jakarta Selatan">
              </div>
              <div class="field">
                <label>LinkedIn Profile</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/...">
              </div>
              <div class="field">
                <label>Portfolio / Website</label>
                <input type="url" id="portfolio-url" placeholder="https://...">
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-head">
              <div class="section-num">2</div>
              <div>
                <h2>Latar Belakang Profesional</h2>
                <p>Pendidikan, pengalaman, dan keahlian</p>
              </div>
            </div>
            <div class="form-grid">
              <div class="field">
                <label>Pengalaman Kerja</label>
                <select id="experience">
                  <option value="">— Pilih —</option>
                  <option>Fresh Graduate (0 tahun)</option>
                  <option>Kurang dari 1 tahun</option>
                  <option>1–2 tahun</option>
                  <option>3–5 tahun</option>
                  <option>5–10 tahun</option>
                  <option>Lebih dari 10 tahun</option>
                </select>
              </div>
              <div class="field">
                <label>Pendidikan Terakhir</label>
                <select id="education">
                  <option value="">— Pilih —</option>
                  <option>SMA / SMK</option>
                  <option>D3 / Diploma</option>
                  <option>S1 / Sarjana</option>
                  <option>S2 / Magister</option>
                  <option>S3 / Doktoral</option>
                </select>
              </div>
              <div class="field">
                <label>Universitas / Institusi</label>
                <input type="text" id="university" placeholder="Nama universitas">
              </div>
              <div class="field">
                <label>Jurusan / Bidang Studi</label>
                <input type="text" id="major" placeholder="Contoh: Teknik Informatika">
              </div>
              <div class="field">
                <label>Gaji yang Diharapkan (Rp)</label>
                <input type="text" id="salary-exp" placeholder="Contoh: 8.000.000">
              </div>
              <div class="field">
                <label>Ketersediaan Mulai Kerja</label>
                <select id="availability">
                  <option value="">— Pilih —</option>
                  <option>Segera (dalam 1 minggu)</option>
                  <option>2 minggu lagi</option>
                  <option>1 bulan lagi</option>
                  <option>2–3 bulan lagi</option>
                  <option>Masih perlu negosiasi</option>
                </select>
              </div>
              <div class="field">
                <label>Preferensi Kerja</label>
                <select id="work-pref">
                  <option value="">— Pilih —</option>
                  <option>On-site penuh</option>
                  <option>Remote penuh</option>
                  <option>Hybrid (fleksibel)</option>
                </select>
              </div>
              <div class="field">
                <label>Perusahaan Sebelumnya</label>
                <input type="text" id="prev-company" placeholder="Nama perusahaan terakhir">
              </div>
            </div>
            <div class="field" style="margin-top:14px">
              <label>Keahlian / Skills</label>
              <div class="skills-wrap" id="skills-wrap" onclick="document.getElementById('skills-inp').focus()">
                <input type="text" id="skills-inp" class="skills-input" placeholder="Ketik lalu Enter..." autocomplete="off">
              </div>
              <span class="skills-hint">Tekan Enter atau koma untuk menambah skill</span>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-head">
              <div class="section-num">3</div>
              <div>
                <h2>Surat &amp; Dokumen</h2>
                <p>Cover letter dan file lamaran</p>
              </div>
            </div>
            <div class="form-grid full" style="gap:14px">
              <div class="field">
                <label>Cover Letter / Surat Lamaran</label>
                <textarea id="cover-letter"
                  placeholder="Ceritakan mengapa kamu tertarik dengan posisi ${esc(job.title)} di ${esc(job.company)} dan apa yang membuatmu kandidat yang tepat..."></textarea>
                <span class="hint">Tulis dengan tulus dan spesifik. Minimal 100 karakter.</span>
              </div>
              <div class="field">
                <label>Upload CV / Resume <span class="req">*</span></label>
                <div class="file-drop" id="cv-zone">
                  <input type="file" id="cv-file" accept=".pdf,.doc,.docx">
                  <span class="file-drop-icon">📄</span>
                  <p>Drag &amp; drop CV kamu, atau <strong style="color:var(--brand)">klik untuk pilih file</strong></p>
                  <span>PDF, DOC, DOCX · Maks. 5MB</span>
                  <div class="file-chosen" id="cv-chosen"></div>
                </div>
              </div>
              <div class="field">
                <label>Upload Portfolio <span style="font-size:.74rem;color:var(--muted)">(opsional)</span></label>
                <div class="file-drop" id="porto-zone">
                  <input type="file" id="porto-file" accept=".pdf,.zip,.rar,.pptx">
                  <span class="file-drop-icon">🗂</span>
                  <p>Upload portfolio atau hasil kerjamu</p>
                  <span>PDF, ZIP, PPTX · Maks. 20MB</span>
                  <div class="file-chosen" id="porto-chosen"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-head">
              <div class="section-num">4</div>
              <div>
                <h2>Pertanyaan Tambahan</h2>
                <p>Info ekstra untuk tim rekruter</p>
              </div>
            </div>
            <div class="form-grid full" style="gap:10px">
              <label class="check-row">
                <input type="checkbox" id="relocation">
                <div>
                  <div class="check-label">Bersedia relokasi ke kota lain</div>
                  <div class="check-sub">Jika posisi mengharuskan perpindahan kota</div>
                </div>
              </label>
              <label class="check-row">
                <input type="checkbox" id="overtime">
                <div>
                  <div class="check-label">Bersedia lembur bila diperlukan</div>
                  <div class="check-sub">Dengan kompensasi sesuai peraturan perusahaan</div>
                </div>
              </label>
              <label class="check-row">
                <input type="checkbox" id="referral">
                <div>
                  <div class="check-label">Mengetahui lowongan dari referensi karyawan</div>
                  <div class="check-sub">Program referral internal perusahaan</div>
                </div>
              </label>
            </div>
            <div class="field" style="margin-top:14px">
              <label>Sumber Informasi Lowongan</label>
              <select id="source">
                <option value="">— Pilih —</option>
                <option>Website InfoLoker</option>
                <option>LinkedIn</option>
                <option>Instagram / Media Sosial</option>
                <option>Rekomendasi teman / keluarga</option>
                <option>Job fair / Campus recruit</option>
                <option>Lainnya</option>
              </select>
            </div>
            <div class="field" style="margin-top:14px">
              <label>Pesan / Informasi Tambahan</label>
              <textarea id="extra" style="min-height:80px"
                placeholder="Ada yang ingin kamu sampaikan kepada rekruter ${esc(job.company)}?"></textarea>
            </div>
          </div>

          <div class="form-section">
            <label class="check-row" style="margin-bottom:20px">
              <input type="checkbox" id="agree-privacy">
              <div>
                <div class="check-label">Saya menyetujui Kebijakan Privasi InfoLoker <span class="req" style="font-size:.9rem">*</span></div>
                <div class="check-sub">Data saya akan digunakan sesuai ketentuan yang berlaku dan diteruskan ke tim rekruter ${esc(job.company)}</div>
              </div>
            </label>
            <div class="submit-row">
              <button type="submit" class="btn-submit" id="submit-btn">Kirim Lamaran →</button>
              <a href="job-detail.html?id=${job.id}" class="btn-cancel">Batal</a>
              <p class="form-note">Pastikan semua data yang kamu isi sudah benar sebelum mengirim.</p>
            </div>
          </div>

        </form>
      </section>
    </div>
  `;

  document.getElementById('apply-form').addEventListener('submit', validateAndSubmit);
  attachSkillInput();

  handleFileDrop(
    document.getElementById('cv-zone'),
    document.getElementById('cv-file'),
    document.getElementById('cv-chosen')
  );
  handleFileDrop(
    document.getElementById('porto-zone'),
    document.getElementById('porto-file'),
    document.getElementById('porto-chosen')
  );

  ['full-name','email','phone'].forEach(fid => {
    const el = document.getElementById(fid);
    if (el) el.addEventListener('input', () => el.classList.remove('invalid'));
  });

  document.getElementById('agree-privacy').addEventListener('change', function() {
    this.closest('.check-row').style.borderColor = '';
  });
}

function showError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
      <h2>Terjadi Kesalahan</h2>
      <p>${esc(msg)}</p>
      <a href="listings.html" style="display:inline-flex;align-items:center;gap:8px;margin-top:8px;padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-d));font-family:'Sora',sans-serif;font-weight:700;color:#040914">← Lihat Semua Lowongan</a>
    </div>
  `;
}

init();
</script>
</body>
</html>
